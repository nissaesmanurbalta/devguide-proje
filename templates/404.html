<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>404 – DevGuide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Fira+Code:wght@400&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #0D0D1A; color: #E8E8F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .code { font-family: 'Fira Code', monospace; font-size: 6rem; font-weight: 700; background: linear-gradient(135deg, #6C63FF, #00D4AA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        h2 { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        p { color: #8B8BA7; margin-bottom: 2rem; }
        .btn-back { background: #6C63FF; color: #fff; border: none; border-radius: 10px; padding: 0.75rem 1.75rem; font-weight: 600; text-decoration: none; font-family: 'Space Grotesk', sans-serif; }
        .btn-back:hover { background: #5A52D5; color: #fff; }
    </style>
</head>
<body>
<div>
    <div class="code">404</div>
    <h2>Sayfa bulunamadı</h2>
    <p>Aradığın sayfa taşınmış veya silinmiş olabilir.</p>
    <a href="/" class="btn-back">Ana Sayfaya Dön</a>
</div>
</body>
</html>
